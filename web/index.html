<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOW AI · 多因子策略引擎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#2d3436;line-height:1.6}
header{background:#1a1a2e;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar input{padding:6px 12px;font-size:14px;border:1px solid #555;border-radius:6px;background:#2d2d44;color:#fff;width:110px}
.toolbar select{padding:6px 10px;font-size:13px;border:1px solid #555;border-radius:6px;background:#2d2d44;color:#fff;cursor:pointer}
.toolbar button{padding:6px 16px;font-size:14px;border:none;border-radius:6px;background:#0984e3;color:#fff;cursor:pointer;font-weight:500}
.toolbar button:hover{background:#0773c5}
.toolbar .mode-btn{padding:5px 12px;font-size:13px;border:1px solid #0984e3;border-radius:6px;background:transparent;color:#0984e3;cursor:pointer}
.toolbar .mode-btn.active{background:#0984e3;color:#fff}
.toolbar .status{font-size:12px;color:#aaa;margin-left:auto}
main{max-width:1600px;margin:0 auto;padding:16px 24px}

/* 卡片 */
.cards{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.card{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.06);min-width:130px;flex:1}
.card .label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px}
.card .value{font-size:20px;font-weight:700;margin-top:2px}
.card .sub{font-size:11px;color:#888;margin-top:2px}
.signal-card{border-left:3px solid transparent}
.signal-card.bullish{border-left-color:#ec2c2c}
.signal-card.bearish{border-left-color:#19a15f}
.signal-card.neutral{border-left-color:#ff9800}

/* 评分柱 */
.score-bar-wrap{height:6px;background:#e0e0e0;border-radius:3px;margin-top:6px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

/* 内容区布局 */
.content{display:grid;grid-template-columns:1fr 400px;gap:16px}
@media(max-width:1200px){.content{grid-template-columns:1fr}}
.chart-section{flex:1}
.sidebar{display:flex;flex-direction:column;gap:12px}

/* 面板 */
.panel{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.panel h3{font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a2e;border-bottom:2px solid #0984e3;padding-bottom:5px;display:flex;align-items:center;justify-content:space-between}

/* Tab */
.tabs{display:flex;gap:0;margin-bottom:0}
.tabs button{padding:5px 10px;font-size:11px;border:1px solid #ddd;border-right:none;background:#f8f9fa;cursor:pointer;color:#666}
.tabs button:first-child{border-radius:6px 0 0 6px}
.tabs button:last-child{border-right:1px solid #ddd;border-radius:0 6px 6px 0}
.tabs button.active{background:#0984e3;color:#fff;border-color:#0984e3}
.tab-content{display:none;margin-top:8px}
.tab-content.active{display:block}

/* 斜率 */
.slope-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f8f8f8;font-size:13px}
.slope-row .name{font-weight:600;min-width:45px}
.slope-row .dir{font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600}
.dir.up{background:#ffeaea;color:#ec2c2c}
.dir.down{background:#e8f5e9;color:#19a15f}
.dir.flat{background:#dfe6e9;color:#636e72}

/* 信号 */
.signal-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f8f8f8;font-size:12px}
.sig-badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.sig-badge.bullish{background:#ffeaea;color:#ec2c2c}
.sig-badge.bearish{background:#e8f5e9;color:#19a15f}
.sig-badge.neutral{background:#fff3e0;color:#e65100}
.sig-date{font-size:10px;color:#aaa;margin-left:auto}

/* 图表 */
.chart-box{background:#fff;border-radius:10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-top:16px}
.chart-box img{width:100%;border-radius:4px}

/* 策略表格 */
.strat-table{max-height:340px;overflow-y:auto;font-size:12px}
.strat-table table{width:100%;border-collapse:collapse}
.strat-table th{position:sticky;top:0;background:#f0f2f5;padding:5px 6px;text-align:left;font-size:10px;color:#999;white-space:nowrap}
.strat-table td{padding:3px 6px;border-bottom:1px solid #f5f5f5;font-size:11px}
.strat-table tr:hover{background:#f0f8ff}
.strat-table .green{color:#19a15f}
.strat-table .red{color:#ec2c2c}
.strat-rank{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-size:10px;font-weight:700;color:#fff;background:#0984e3;margin-right:4px}
.strat-rank.gold{background:#f39c12}
.strat-rank.silver{background:#95a5a6}
.strat-rank.bronze{background:#e67e22}

/* 共识卡片 */
.consensus-banner{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-bottom:8px}
.consensus-banner.strong-bull{background:#ffeaea;color:#ec2c2c;border:1px solid #ec2c2c}
.consensus-banner.bull{background:#fff5f5;color:#e74c3c;border:1px solid #e74c3c}
.consensus-banner.strong-bear{background:#e8f5e9;color:#19a15f;border:1px solid #19a15f}
.consensus-banner.bear{background:#f0faf0;color:#27ae60;border:1px solid #27ae60}
.consensus-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin:6px 0}
.consensus-bar-inner{height:100%;border-radius:4px;transition:width 0.5s}

/* 策略信号行 */
.strat-signal{padding:5px 8px;margin:3px 0;border-radius:4px;font-size:11px;display:flex;align-items:center;justify-content:space-between}
.strat-signal.buy{background:#ffeaea}
.strat-signal.sell{background:#e8f5e9}
.strat-signal strong-buy{background:#ffcccc}
.strat-signal strong-sell{background:#c8e6c9}

/* 组合面板 */
.portfolio-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.portfolio-table th{background:#f0f2f5;padding:5px 6px;text-align:left;font-size:10px;color:#999}
.portfolio-table td{padding:5px 6px;border-bottom:1px solid #f5f5f5}
.portfolio-table .method{font-weight:600}
.portfolio-table .positive{color:#ec2c2c;font-weight:600}
.portfolio-table .negative{color:#19a15f;font-weight:600}
.regime-card{padding:10px;border-radius:8px;background:#f0f8ff;border:1px solid #0984e3;margin-bottom:10px}
.regime-card .title{font-size:13px;font-weight:700;color:#1a1a2e}
.regime-card .desc{font-size:11px;color:#666;margin-top:3px}
.regime-card .score{font-size:11px;color:#0984e3;margin-top:3px}
.portfolio-img{width:100%;border-radius:4px;margin-top:8px}

/* 实时报价 */
.quote-bar{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border-radius:8px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);flex-wrap:wrap}
.quote-price{font-size:22px;font-weight:800}
.quote-change{font-size:14px;font-weight:600;padding:2px 10px;border-radius:6px}
.quote-change.up{background:#ffeaea;color:#ec2c2c}
.quote-change.down{background:#e8f5e9;color:#19a15f}
.quote-info{font-size:11px;color:#999}
.quote-info span{margin-right:12px}
.intraday-chart{width:100%;height:300px;background:#fafafa;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px}
.intraday-controls{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.intraday-controls button{padding:4px 10px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;cursor:pointer}
.intraday-controls button.active{background:#0984e3;color:#fff;border-color:#0984e3}
.market-mini{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px}
.market-mini .idx-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f5f5f5}
.market-mini .idx-name{color:#666}
.idx-up{color:#ec2c2c;font-weight:600}
.idx-down{color:#19a15f;font-weight:600}

/* 因子表 */
.factor-table{max-height:300px;overflow-y:auto;font-size:12px}
.factor-table table{width:100%;border-collapse:collapse}
.factor-table th{position:sticky;top:0;background:#f0f2f5;padding:4px 8px;text-align:left;font-size:11px;color:#999}
.factor-table td{padding:3px 8px;border-bottom:1px solid #f5f5f5}
.factor-cat{color:#999;font-size:10px}

.loader{display:none;text-align:center;padding:40px;color:#888}
.loader.active{display:block}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#0984e3;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
</style>
</head>
<body>

<header>
  <h1>FLOW AI · 多因子策略引擎</h1>
  <div class="toolbar">
    <input id="tickerInput" placeholder="股票代码" value="NVDA" />
    <select id="periodSelect">
      <option value="1y" selected>1年</option>
      <option value="6mo">6个月</option>
      <option value="3mo">3个月</option>
    </select>
    <button onclick="analyze()">分析</button>
    <span style="color:#888">|</span>
    <button class="mode-btn active" data-mode="multi" onclick="setMode('multi')">多面板</button>
    <button class="mode-btn" data-mode="single" onclick="setMode('single')">单面板</button>
    <span class="status" id="statusBar">就绪</span>
  </div>
</header>

<div class="loader active" id="loader">
  <div class="spinner"></div>
  <p style="margin-top:10px;font-size:14px">计算因子、策略信号、回测中...</p>
</div>

<main id="mainContent" class="hidden">
  <!-- 概览卡片 -->
  <div class="cards" id="cards"></div>

  <div class="content">
    <!-- 左侧: 图表 -->
    <div class="chart-section">
      <!-- 实时报价条 -->
      <div class="quote-bar" id="quoteBar">
        <div style="color:#aaa;font-size:13px">加载实时报价...</div>
      </div>
      <!-- 策略共识横幅 -->
      <div id="consensusBanner" style="margin-bottom:12px"></div>
      <div class="chart-box">
        <div class="tabs" style="margin-bottom:8px">
          <button class="active" onclick="switchChartTab('factor')">因子图表</button>
          <button onclick="switchChartTab('strategy')">策略信号图</button>
          <button onclick="switchChartTab('portfolio')">组合权益图</button>
          <button onclick="switchChartTab('intraday')">日内走势</button>
        </div>
        <div class="tab-content active" id="tab-chart-factor">
          <img id="chartImg" src="" alt="图表" style="width:100%;border-radius:4px" />
        </div>
        <div class="tab-content" id="tab-chart-strategy" style="text-align:center;padding:20px;color:#888">
          点击生成策略信号图
          <br><button onclick="genStrategyChart()" style="margin-top:10px;padding:8px 20px;font-size:13px;border:none;border-radius:6px;background:#0984e3;color:#fff;cursor:pointer">生成</button>
        </div>
        <div class="tab-content" id="tab-chart-portfolio">
          <img id="portfolioChartImg" src="" alt="组合权益图" style="width:100%;border-radius:4px" />
        </div>
        <div class="tab-content" id="tab-chart-intraday">
          <div class="intraday-controls">
            <button class="active" data-int="5m" onclick="loadIntraday('5m')">5分钟</button>
            <button data-int="15m" onclick="loadIntraday('15m')">15分钟</button>
            <button data-int="30m" onclick="loadIntraday('30m')">30分钟</button>
            <button data-int="60m" onclick="loadIntraday('60m')">60分钟</button>
            <span style="margin-left:auto;font-size:11px;color:#aaa" id="intradayStatus"></span>
          </div>
          <div id="intradayArea">
            <div class="intraday-chart">选择粒度查看日内走势</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧: 侧边栏 -->
    <div class="sidebar">
      <!-- Tab -->
      <div class="panel">
        <div class="tabs">
          <button class="active" onclick="switchTab('strategy')">策略</button>
          <button onclick="switchTab('portfolio')">组合</button>
          <button onclick="switchTab('signals')">信号</button>
          <button onclick="switchTab('slopes')">斜率</button>
          <button onclick="switchTab('pattern')">形态</button>
          <button onclick="switchTab('factors')">因子</button>
        </div>

        <!-- 策略 Tab -->
        <div class="tab-content active" id="tab-strategy">
          <div id="strategyContent" style="margin-top:4px">
            <div style="color:#aaa;font-size:12px;text-align:center;padding:20px">加载策略回测...</div>
          </div>
        </div>

        <!-- 组合 Tab -->
        <div class="tab-content" id="tab-portfolio">
          <div id="portfolioContent" style="margin-top:4px">
            <div style="color:#aaa;font-size:12px;text-align:center;padding:20px">加载组合分析...</div>
          </div>
        </div>

        <!-- 信号 Tab -->
        <div class="tab-content" id="tab-signals">
          <div id="signalContent" style="max-height:400px;overflow-y:auto">
            <div style="color:#aaa;font-size:12px">加载中...</div>
          </div>
        </div>

        <!-- 斜率 Tab -->
        <div class="tab-content" id="tab-slopes">
          <div id="slopeContent"></div>
          <div id="srContent" style="margin-top:12px;padding-top:8px;border-top:1px solid #eee"></div>
        </div>

        <!-- 形态搜索 Tab -->
        <div class="tab-content" id="tab-pattern">
          <div>
            <select id="searchType" style="padding:4px 8px;font-size:12px;border:1px solid #ddd;border-radius:4px;margin-bottom:8px;width:100%">
              <option value="historical">该股票历史相似</option>
              <option value="cross_stock">其他股票相似走势</option>
            </select>
            <button onclick="patternSearch()" style="padding:5px 12px;font-size:12px;border:none;border-radius:6px;background:#0984e3;color:#fff;cursor:pointer;width:100%">搜索</button>
            <div id="patternFeatures" style="margin-top:8px;font-size:11px;color:#666"></div>
            <div id="patternResults" style="margin-top:8px;max-height:250px;overflow-y:auto"></div>
          </div>
        </div>

        <!-- 因子 Tab -->
        <div class="tab-content" id="tab-factors">
          <div class="factor-table" id="factorContent">
            <div style="color:#aaa;font-size:12px">加载中...</div>
          </div>
        </div>
      </div>

      <!-- 交叉记录 -->
      <div class="panel" id="crossPanel">
        <h3>近期交叉</h3>
        <div id="crossContent"></div>
      </div>

      <!-- 大盘快照 -->
      <div class="panel" id="marketPanel">
        <h3>大盘快照 <span style="font-size:10px;color:#aaa" id="marketTime"></span></h3>
        <div class="market-mini" id="marketContent">
          <div style="color:#aaa;font-size:11px">加载中...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
let currentMode = "multi";
let currentTicker = "";
let strategyData = null;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
  if (currentTicker) analyze();
}

function switchTab(tab) {
  const tabs = ["strategy","portfolio","signals","slopes","pattern","factors"];
  document.querySelectorAll(".sidebar .tabs button").forEach((b, i) => b.classList.toggle("active", tabs[i] === tab));
  document.querySelectorAll(".sidebar .tab-content").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
}

function switchChartTab(tab) {
  document.querySelectorAll(".chart-box .tabs button").forEach((b, i) => b.classList.toggle("active", ["factor","strategy","portfolio","intraday"][i] === tab));
  document.querySelectorAll(".chart-box .tab-content").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-chart-" + tab).classList.add("active");
  if (tab === "intraday" && currentTicker) loadIntraday("5m");
}

async function analyze() {
  const ticker = document.getElementById("tickerInput").value.trim();
  if (!ticker) return;
  currentTicker = ticker;

  document.getElementById("loader").classList.add("active");
  document.getElementById("mainContent").classList.add("hidden");
  document.getElementById("statusBar").textContent = "分析中...";

  try {
    const period = document.getElementById("periodSelect").value;
    const [analyzeRes, backtestRes, consensusRes, portfolioRes] = await Promise.all([
      fetch(`/api/analyze/${ticker}?period=${period}&mode=${currentMode}`).then(r => r.json()),
      fetch(`/api/backtest/${ticker}?period=${period}`).then(r => r.json()),
      fetch(`/api/consensus/${ticker}?period=${period}`).then(r => r.json()),
      fetch(`/api/portfolio/${ticker}?period=${period}`).then(r => r.json()),
    ]);
    strategyData = backtestRes;
    render(analyzeRes, backtestRes, consensusRes, portfolioRes);
    document.getElementById("statusBar").textContent =
      `完成 | ${analyzeRes.data_start}~${analyzeRes.data_end} | ${analyzeRes.records}条 | ${analyzeRes.factor_count}因子`;
    // 后台加载实时报价和大盘
    loadQuote(ticker);
    loadMarketSnapshot();
  } catch (e) {
    document.getElementById("statusBar").textContent = "出错: " + e.message;
  } finally {
    document.getElementById("loader").classList.remove("active");
    document.getElementById("mainContent").classList.remove("hidden");
  }
}

function render(data, btData, consData, portfolioData) {
  const a = data.analysis;
  const sig = data.signals;

  // 概览卡片
  let sigClass = sig.verdict.includes("偏多") || sig.verdict.includes("强偏多") ? "signal-card bullish" :
                 sig.verdict.includes("偏空") || sig.verdict.includes("强偏空") ? "signal-card bearish" : "signal-card neutral";
  let barPct = Math.min(Math.abs(sig.score) / 6 * 100, 100);
  let barColor = sig.score > 0 ? "#ec2c2c" : sig.score < 0 ? "#19a15f" : "#ff9800";

  let numStrats = btData.strategies ? Object.keys(btData.strategies).length : 0;
  let topStrat = btData.ranked_by_sharpe ? btData.ranked_by_sharpe[0] : null;
  let topName = topStrat && btData.strategies[topStrat] ? btData.strategies[topStrat].name : "--";

  document.getElementById("cards").innerHTML = `
    <div class="card signal-card ${a.overall_trend.includes("上升")?"bullish":a.overall_trend.includes("下降")?"bearish":""}">
      <div class="label">趋势</div>
      <div class="value" style="font-size:16px">${a.overall_trend}</div>
    </div>
    <div class="card">
      <div class="label">收盘</div>
      <div class="value" style="font-size:16px">${a.latest_close}</div>
      <div class="sub">${a.latest_date}</div>
    </div>
    <div class="card ${sigClass}">
      <div class="label">信号判定</div>
      <div class="value" style="font-size:16px;color:${sig.score>0?"#ec2c2c":sig.score<0?"#19a15f":"#ff9800"}">${sig.verdict}</div>
      <div class="sub">评分: ${sig.score>0?"+":""}${sig.score}</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
    </div>
    <div class="card">
      <div class="label">最佳策略</div>
      <div class="value" style="font-size:14px">${topName}</div>
      <div class="sub">共 ${numStrats} 个策略</div>
    </div>
    <div class="card">
      <div class="label">策略共识</div>
      <div class="value" style="font-size:16px;color:${consData.consensus&&consData.consensus.consensus.includes("偏多")?"#ec2c2c":"#19a15f"}">${consData.consensus?consData.consensus.consensus:"--"}</div>
      <div class="sub">评分: ${consData.consensus?consData.consensus.aggregate_score:"--"}</div>
    </div>
  `;

  // 共识横幅
  let cons = consData.consensus || {};
  let consClass = cons.consensus && cons.consensus.includes("偏多") ? "strong-bull" : "strong-bear";
  let consRatio = cons.bullish_ratio ? (cons.bullish_ratio * 100) : 50;
  document.getElementById("consensusBanner").innerHTML = `
    <div class="consensus-banner ${consClass}">
      多策略共识: ${cons.consensus||"--"} (评分:${cons.aggregate_score||0})
      <div class="consensus-bar"><div class="consensus-bar-inner" style="width:${consRatio}%;background:${consRatio>50?"#ec2c2c":"#19a15f"}"></div></div>
      <div style="font-size:10px;display:flex;justify-content:space-between"><span>偏空</span><span>偏多</span></div>
      <div style="font-size:10px;color:#888;margin-top:4px">活跃策略: ${cons.active_strategies?Object.keys(cons.active_strategies).length:0} 个</div>
    </div>
  `;

  // 斜率
  let slopeHtml = "";
  for (const [name, info] of Object.entries(a.slopes||{})) {
    let dirClass = info.direction==="上升"?"up":info.direction==="下降"?"down":"flat";
    let sym = info.direction==="上升"?"↑":info.direction==="下降"?"↓":"→";
    slopeHtml += `<div class="slope-row"><span class="name">${name}</span><span>${info.value}</span><span>${info.slope}% ${sym}</span><span class="dir ${dirClass}">${info.direction}</span></div>`;
  }
  document.getElementById("slopeContent").innerHTML = slopeHtml || '<div style="color:#aaa;font-size:12px">无数据</div>';

  // 支撑压力
  const sr = a.support_resistance||{};
  document.getElementById("srContent").innerHTML = `
    <div style="font-size:12px;margin-bottom:4px"><span style="color:#4caf50">支撑:</span> ${sr.support||"--"} <span style="color:#ef5350;margin-left:8px">压力:</span> ${sr.resistance||"--"}</div>`;

  // 信号
  let sigHtml = "";
  (sig.active||[]).forEach(s => {
    let bc = s.direction==="bullish"?"bullish":s.direction==="bearish"?"bearish":"neutral";
    let dl = s.direction==="bullish"?"看多":s.direction==="bearish"?"看空":"中性";
    sigHtml += `<div class="signal-item"><span class="sig-badge ${bc}">${dl}</span><span>${s.name}</span><span style="font-size:10px;color:#999;margin-left:4px">强度${s.strength}</span><span class="sig-date">${s.last_date||""}</span></div>`;
  });
  document.getElementById("signalContent").innerHTML = sigHtml || '<div style="color:#aaa;font-size:12px">近期无信号</div>';

  // 策略回测表格
  renderStrategyTable(btData);

  // 交叉
  let crossHtml = "";
  (a.crosses||[]).slice(-5).reverse().forEach(c => {
    crossHtml += `<div style="padding:4px 0;font-size:12px;border-bottom:1px solid #f8f8f8"><span style="color:${c.type==="金叉"?"#ec2c2c":"#19a15f"};font-weight:600">${c.type}</span> <span style="color:#888">${c.date}</span> ${c.ma1}×${c.ma2}</div>`;
  });
  document.getElementById("crossContent").innerHTML = crossHtml || '<div style="color:#aaa;font-size:12px">无交叉</div>';

  // 图表
  if (data.chart_path) {
    document.getElementById("chartImg").src = `/api/chart?path=${encodeURIComponent(data.chart_path)}&t=${Date.now()}`;
  }

  // 组合权益图 (放到左侧 tab)
  if (portfolioData && portfolioData.portfolio_chart_path) {
    document.getElementById("portfolioChartImg").src = `/api/chart?path=${encodeURIComponent(portfolioData.portfolio_chart_path)}&t=${Date.now()}`;
  }

  // 加载因子
  loadFactors(currentTicker, document.getElementById("periodSelect").value);

  // 组合面板
  renderPortfolio(portfolioData);
}

function renderStrategyTable(btData) {
  const strategies = btData.strategies || {};
  const ranked = btData.ranked_by_sharpe || [];
  if (!ranked.length) {
    document.getElementById("strategyContent").innerHTML = '<div style="color:#aaa;text-align:center;padding:20px">无回测数据</div>';
    return;
  }

  let html = `<div class="strat-table"><table><tr>
    <th>#</th><th>策略</th><th>类别</th><th>收益</th><th>夏普</th><th>回撤</th><th>胜率</th><th>交易</th><th>盈亏比</th>
  </tr>`;

  ranked.forEach((sid, idx) => {
    const s = strategies[sid];
    if (!s) return;
    let rankClass = idx === 0 ? "gold" : idx === 1 ? "silver" : idx === 2 ? "bronze" : "";
    let retClass = parseFloat(s.total_return) > 0 ? "green" : "red";
    html += `<tr>
      <td><span class="strat-rank ${rankClass}">${idx+1}</span></td>
      <td style="font-weight:600;white-space:nowrap">${s.name}</td>
      <td style="font-size:10px;color:#999">${s.category}</td>
      <td class="${retClass}" style="font-weight:600">${s.total_return}</td>
      <td>${s.sharpe_ratio}</td>
      <td style="color:#ec2c2c">${s.max_drawdown}</td>
      <td>${s.win_rate}</td>
      <td>${s.total_trades}</td>
      <td>${s.profit_factor}</td>
    </tr>`;
  });
  html += "</table></div>";

  // 顶部策略活跃信号
  let activeHtml = "<div style='margin-top:8px;padding-top:8px;border-top:1px solid #eee'><div style='font-size:11px;font-weight:600;color:#999;margin-bottom:4px'>当前活跃策略信号</div>";
  (btData.consensus||{}).active_strategies || {};
  // 从consensus data获取
  fetch(`/api/consensus/${currentTicker}?period=${document.getElementById("periodSelect").value}`)
    .then(r => r.json())
    .then(data => {
      let signals = data.consensus && data.consensus.active_strategies || {};
      let sigHtml = "";
      for (const [sid, info] of Object.entries(signals)) {
        let cls = info.signal > 0 ? "buy" : "sell";
        let txt = info.signal >= 2 ? "强买" : info.signal === 1 ? "买入" : info.signal <= -2 ? "强卖" : "卖出";
        sigHtml += `<div class="strat-signal ${cls}"><span>${info.name}</span><span style="font-weight:600">${txt}</span></div>`;
      }
      document.getElementById("strategySignals").innerHTML = sigHtml || '<div style="font-size:11px;color:#aaa">无活跃信号</div>';
    });

  document.getElementById("strategyContent").innerHTML = html + activeHtml + '<div id="strategySignals" style="max-height:150px;overflow-y:auto"></div>';
}

function renderPortfolio(data) {
  if (!data || data.error) {
    document.getElementById("portfolioContent").innerHTML = '<div style="color:#aaa;text-align:center;padding:20px">组合数据加载失败</div>';
    return;
  }

  const regime = data.market_regime || {};
  const portfolios = data.portfolios || {};
  const top = data.top_strategies || [];
  const bh = data.buy_hold || {};

  // 市场状态卡片
  let regimeHtml = `
    <div class="regime-card">
      <div class="title">${regime.name || "--"}</div>
      <div class="desc">${regime.description || ""}</div>
      <div class="score">推荐类别: ${regime.category || "--"} | 置信度: ${regime.score || 0}</div>
    </div>
  `;

  // 组合对比表
  let portHtml = `<table class="portfolio-table"><tr>
    <th>组合方式</th><th>收益</th><th>夏普</th><th>回撤</th><th>胜率</th><th>交易</th>
  </tr>`;
  const methodNames = {
    equal_weight_top5: "等权Top5",
    sharpe_weight_top5: "夏普加权Top5",
    regime_driven: "状态驱动",
    dynamic_vol_target: "动态波动率"
  };
  for (const [key, p] of Object.entries(portfolios)) {
    if (!p) continue;
    let ret = p.total_return || 0;
    let retClass = ret > 0 ? "positive" : ret < 0 ? "negative" : "";
    portHtml += `<tr>
      <td class="method">${methodNames[key] || key}</td>
      <td class="${retClass}">${ret}%</td>
      <td>${p.sharpe_ratio}</td>
      <td style="color:#ec2c2c">${p.max_drawdown}%</td>
      <td>${p.win_rate}%</td>
      <td>${p.total_trades}</td>
    </tr>`;
  }
  portHtml += `<tr style="background:#fafafa">
    <td class="method">买入持有</td>
    <td>${bh.total_return || 0}%</td>
    <td>-</td>
    <td>-</td>
    <td>-</td>
    <td>-</td>
  </tr>`;
  portHtml += "</table>";

  // Top策略
  let topHtml = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee"><div style="font-size:11px;font-weight:600;color:#999;margin-bottom:4px">Top 5 策略</div>`;
  top.forEach((s, i) => {
    topHtml += `<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0">
      <span>${i+1}. ${s.name}</span>
      <span style="color:#0984e3">夏普 ${s.sharpe} | 收益 ${s.total_return}%</span>
    </div>`;
  });
  topHtml += "</div>";

  // 组合权益图
  let chartHtml = "";
  if (data.portfolio_chart_path) {
    chartHtml = `<img class="portfolio-img" src="/api/chart?path=${encodeURIComponent(data.portfolio_chart_path)}&t=${Date.now()}" alt="组合权益曲线" />`;
  }

  document.getElementById("portfolioContent").innerHTML = regimeHtml + portHtml + topHtml + chartHtml;
}

async function genStrategyChart() {
  if (!currentTicker) return;
  const tab = document.getElementById("tab-chart-strategy");
  tab.innerHTML = '<div style="padding:20px;color:#888"><div class="spinner"></div><p>生成策略信号图...</p></div>';
  try {
    const res = await fetch(`/api/strategy_chart/${currentTicker}?period=${document.getElementById("periodSelect").value}`);
    const data = await res.json();
    if (data.error) { tab.innerHTML = `<div style="color:red">${data.error}</div>`; return; }
    tab.innerHTML = `<img src="/api/chart?path=${encodeURIComponent(data.chart_path)}&t=${Date.now()}" style="width:100%;border-radius:4px" />`;
  } catch(e) {
    tab.innerHTML = `<div style="color:red">生成失败: ${e.message}</div>`;
  }
}

async function loadFactors(ticker, period) {
  try {
    const res = await fetch(`/api/factors/${ticker}?period=${period}`);
    const data = await res.json();
    const factors = data.factors||{};
    let html = "<table><tr><th>因子</th><th>类别</th><th>值</th></tr>";
    for (const [key, f] of Object.entries(factors)) {
      html += `<tr><td>${f.description}</td><td class="factor-cat">${f.category}</td><td style="font-weight:600">${f.value}</td></tr>`;
    }
    html += "</table>";
    document.getElementById("factorContent").innerHTML = html;
  } catch(e) { document.getElementById("factorContent").innerHTML = '<div style="color:#aaa">加载失败</div>'; }
}

async function patternSearch() {
  const ticker = currentTicker;
  const type = document.getElementById("searchType").value;
  const resultsEl = document.getElementById("patternResults");
  const featEl = document.getElementById("patternFeatures");
  resultsEl.innerHTML = '<div style="color:#888">搜索中...</div>';
  try {
    const res = await fetch(`/api/pattern_search/${ticker}?type=${type}&window=30&top_n=5`);
    const data = await res.json();
    if (data.error) { resultsEl.innerHTML = `<div style="color:red">${data.error}</div>`; return; }
    const feat = data.pattern_features||{};
    featEl.innerHTML = `类型: <b>${feat.pattern_type||"--"}</b> | 回报: ${feat.total_return||"--"}% | 波动: ${feat.volatility||"--"}% | 斜率: ${feat.slope||"--"}`;
    let html = "";
    const items = data.similar_periods || data.similar_stocks || [];
    items.forEach(item => {
      html += `<div class="search-result"><div><span style="font-weight:600;color:#0984e3">corr=${item.correlation}</span> ${item.ticker?`股票: <b>${item.ticker}</b>`:""} ${item.pattern_type?`<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#e0e0e0;color:#555;margin-left:4px">${item.pattern_type}</span>`:""}</div><div style="color:#888;font-size:11px">${(item.start_date||"").slice(0,10)} ~ ${(item.end_date||"").slice(0,10)}</div></div>`;
    });
    resultsEl.innerHTML = html || '<div style="color:#aaa">无相似结果</div>';
  } catch(e) { resultsEl.innerHTML = `<div style="color:red">搜索失败: ${e.message}</div>`; }
}

async function loadQuote(ticker) {
  try {
    const res = await fetch(`/api/quote/${ticker}`);
    const q = await res.json();
    if (q.error) return;
    const up = q.change_pct >= 0;
    document.getElementById("quoteBar").innerHTML = `
      <div style="font-weight:700;min-width:60px;color:#0984e3">${q.ticker}</div>
      <div style="font-size:12px;color:#666;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.name}</div>
      <div class="quote-price" style="color:${up?'#ec2c2c':'#19a15f'}">${q.price}</div>
      <div class="quote-change ${up?'up':'down'}">${up?'+':''}${q.change} (${up?'+':''}${q.change_pct}%)</div>
      <div class="quote-info">
        <span>开 ${q.open||'--'}</span><span>高 ${q.day_high||'--'}</span><span>低 ${q.day_low||'--'}</span>
        <span>昨收 ${q.prev_close}</span><span>量 ${(q.volume/1e6).toFixed(1)}M</span>
      </div>
      <div class="quote-info" style="margin-left:auto">
        <span>PE ${q.pe_ratio||'--'}</span><span>市值 ${q.market_cap?(q.market_cap/1e12).toFixed(2)+'T':'--'}</span>
        <span style="color:${q.market_state==='REGULAR'?'#19a15f':'#999'}">${q.market_state==='REGULAR'?'交易中':'已收盘'}</span>
      </div>
    `;
  } catch(e) { document.getElementById("quoteBar").innerHTML = '<div style="color:#aaa;font-size:13px">报价加载失败</div>'; }
}

async function loadMarketSnapshot() {
  try {
    const res = await fetch("/api/market_snapshot");
    const data = await res.json();
    if (data.error) return;
    
    document.getElementById("marketTime").textContent = data.timestamp.slice(11,16);
    
    let html = "";
    for (const [k, v] of Object.entries(data.indices)) {
      const up = v.change_pct >= 0;
      html += `<div class="idx-row"><span class="idx-name">${v.name}</span><span class="${up?'idx-up':'idx-down'}">${v.price} ${up?'+':''}${v.change_pct}%</span></div>`;
    }
    if (data.sectors && data.sectors.length) {
      html += '<div style="grid-column:1/-1;margin-top:6px;padding-top:6px;border-top:1px solid #eee;font-size:10px;color:#999;font-weight:600">板块 ETF</div>';
      const sorted = data.sectors.sort((a,b) => b.change_pct - a.change_pct);
      sorted.forEach(s => {
        const up = s.change_pct >= 0;
        html += `<div class="idx-row"><span class="idx-name">${s.name}</span><span class="${up?'idx-up':'idx-down'}">${up?'+':''}${s.change_pct}%</span></div>`;
      });
    }
    document.getElementById("marketContent").innerHTML = html;
  } catch(e) { document.getElementById("marketContent").innerHTML = '<div style="color:#aaa">加载失败</div>'; }
}

let intradayData = null;
let currentIntraInterval = "5m";

async function loadIntraday(interval) {
  if (!currentTicker) return;
  currentIntraInterval = interval;
  
  // 切换按钮状态
  document.querySelectorAll(".intraday-controls button").forEach(b => {
    b.classList.toggle("active", b.dataset.int === interval);
  });
  
  document.getElementById("intradayStatus").textContent = "加载中...";
  
  try {
    const res = await fetch(`/api/intraday/${currentTicker}?interval=${interval}&period=1d`);
    const data = await res.json();
    if (data.error) {
      document.getElementById("intradayArea").innerHTML = `<div class="intraday-chart">错误: ${data.error}</div>`;
      return;
    }
    intradayData = data;
    document.getElementById("intradayStatus").textContent = `${data.data_count}个数据点`;
    drawIntraday(data);
  } catch(e) {
    document.getElementById("intradayArea").innerHTML = `<div class="intraday-chart">加载失败: ${e.message}</div>`;
  }
}

function drawIntraday(data) {
  const area = document.getElementById("intradayArea");
  const w = area.clientWidth || 700;
  const h = 380;
  const pad = { top: 20, right: 60, bottom: 40, left: 60 };
  
  // 计算价格范围
  const prices = data.data.map(d => d.close);
  const highs = data.data.map(d => d.high);
  const lows = data.data.map(d => d.low);
  const vols = data.data.map(d => d.volume);
  const allP = [...prices, ...highs, ...lows];
  const pMin = Math.min(...allP);
  const pMax = Math.max(...allP);
  const pRange = pMax - pMin || 1;
  const vMax = Math.max(...vols) || 1;
  
  const plotH = h - pad.top - pad.bottom - 80; // 留80给成交量
  const volH = 60;
  
  const xScale = (i) => pad.left + (i / (prices.length - 1)) * (w - pad.left - pad.right);
  const yScale = (p) => pad.top + plotH - ((p - pMin) / pRange) * plotH;
  const vScale = (v) => (v / vMax) * volH;
  
  // 确定颜色
  const prevClose = data.prev_close || prices[0];
  const upColor = "#ec2c2c";
  const downColor = "#19a15f";
  const lineColor = data.change_pct >= 0 ? upColor : downColor;
  
  let svg = `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border-radius:6px">`;
  
  // 网格线
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (plotH / 5) * i;
    const price = pMax - (pRange / 5) * i;
    svg += `<line x1="${pad.left}" y1="${y}" x2="${w-pad.right}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>`;
    svg += `<text x="${pad.left-5}" y="${y+4}" text-anchor="end" font-size="11" fill="#999">${price.toFixed(2)}</text>`;
  }
  
  // 昨收线
  const yPrev = yScale(prevClose);
  svg += `<line x1="${pad.left}" y1="${yPrev}" x2="${w-pad.right}" y2="${yPrev}" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>`;
  svg += `<text x="${w-pad.right+5}" y="${yPrev+4}" font-size="10" fill="#999">昨收</text>`;
  
  // 价格线 + 填充
  let pathD = "";
  let fillD = "";
  prices.forEach((p, i) => {
    const x = xScale(i), y = yScale(p);
    pathD += (i === 0 ? "M" : "L") + `${x},${y} `;
    fillD += (i === 0 ? "M" : "L") + `${x},${y} `;
  });
  // 填充区域
  fillD += `L${xScale(prices.length-1)},${yPrev} L${pad.left},${yPrev} Z`;
  svg += `<path d="${fillD}" fill="${lineColor}" fill-opacity="0.1"/>`;
  svg += `<path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2"/>`;
  
  // 数据点 (每5个标一个)
  prices.forEach((p, i) => {
    if (i % 5 === 0 || i === prices.length - 1) {
      const x = xScale(i), y = yScale(p);
      svg += `<circle cx="${x}" cy="${y}" r="3" fill="${lineColor}"/>`;
    }
  });
  
  // X轴标签 (时间)
  const step = Math.max(1, Math.floor(prices.length / 6));
  for (let i = 0; i < prices.length; i += step) {
    const x = xScale(i);
    const timeStr = data.data[i].datetime.slice(11, 16);
    svg += `<text x="${x}" y="${pad.top+plotH+18}" text-anchor="middle" font-size="10" fill="#999">${timeStr}</text>`;
  }
  
  // 成交量柱
  const volTop = pad.top + plotH + 25;
  vols.forEach((v, i) => {
    const x = xScale(i);
    const barW = Math.max(1, (w - pad.left - pad.right) / prices.length * 0.8);
    const hBar = vScale(v);
    const isUp = i > 0 ? prices[i] >= prices[i-1] : prices[i] >= prevClose;
    const vColor = isUp ? upColor : downColor;
    svg += `<rect x="${x - barW/2}" y="${volTop + volH - hBar}" width="${barW}" height="${Math.max(1, hBar)}" fill="${vColor}" fill-opacity="0.5"/>`;
  });
  
  // 成交量标签
  svg += `<text x="${pad.left}" y="${volTop-2}" font-size="9" fill="#aaa">成交量</text>`;
  
  // 图例
  const up = data.change_pct >= 0;
  svg += `<text x="${w-pad.right}" y="15" text-anchor="end" font-size="14" font-weight="bold" fill="${lineColor}">${data.current_price}</text>`;
  svg += `<text x="${w-pad.right}" y="30" text-anchor="end" font-size="11" fill="${lineColor}">${up?'+':''}${data.change} (${up?'+':''}${data.change_pct}%)</text>`;
  svg += `<text x="${pad.left}" y="15" font-size="11" fill="#666">${data.ticker} · ${data.interval} · ${data.data_start?.slice(5)||''} ~ ${data.data_end?.slice(5)||''}</text>`;
  
  svg += "</svg>";
  area.innerHTML = svg;
}
